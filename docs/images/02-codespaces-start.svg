<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Open the repository in GitHub Codespaces</title>
  <desc id="desc">A visual guide showing the Code button, Codespaces tab, and Create codespace button.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.browser{fill:#fff;stroke:#cbd5e1;stroke-width:2}.bar{fill:#e2e8f0}.btn{fill:#16a34a}.blue{fill:#2563eb}.red{fill:#ef4444}.yellow{fill:#f59e0b}.text{font:500 20px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.label{font:800 28px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.small{font:500 16px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.code{font:600 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.callout{fill:#fff7ed;stroke:#fb923c;stroke-width:3}.line{stroke:#fb923c;stroke-width:5;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#fb923c"/></marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="55" y="62" class="label" fill="#0f172a">Step 1: Codespacesで開く</text>
  <text x="55" y="96" class="text" fill="#475569">ブラウザだけで初期設定できます。ローカルPCへのPython導入は不要です。</text>

  <rect x="55" y="135" width="1090" height="540" rx="18" class="browser"/>
  <rect x="55" y="135" width="1090" height="54" rx="18" class="bar"/>
  <circle cx="92" cy="162" r="8" class="red"/><circle cx="120" cy="162" r="8" class="yellow"/><circle cx="148" cy="162" r="8" class="btn"/>
  <rect x="205" y="150" width="620" height="24" rx="12" fill="#f8fafc"/>
  <text x="225" y="168" class="small" fill="#64748b">github.com/univcorp2-ctrl/telegram-ai-company-hub</text>

  <text x="95" y="245" class="label" fill="#0f172a">telegram-ai-company-hub</text>
  <rect x="915" y="218" width="150" height="46" rx="10" class="btn"/>
  <text x="955" y="248" class="text" fill="white">Code</text>

  <rect x="810" y="285" width="285" height="240" rx="16" fill="#fff" stroke="#94a3b8" stroke-width="2"/>
  <text x="840" y="330" class="text" fill="#0f172a">Local</text>
  <text x="930" y="330" class="text" fill="#0f172a">Codespaces</text>
  <line x1="920" y1="342" x2="1045" y2="342" stroke="#2563eb" stroke-width="4"/>
  <rect x="840" y="380" width="225" height="54" rx="10" class="blue"/>
  <text x="875" y="414" class="text" fill="white">Create codespace</text>
  <text x="840" y="470" class="small" fill="#64748b">Branch: main</text>

  <rect x="95" y="330" width="520" height="230" rx="18" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="125" y="375" class="text" fill="#0f172a">Codespacesが開いたら、ターミナルで実行:</text>
  <rect x="125" y="405" width="430" height="72" rx="12" fill="#0f172a"/>
  <text x="148" y="448" class="code" fill="#e2e8f0">uvicorn app.main:app --reload</text>
  <text x="125" y="518" class="small" fill="#475569">devcontainerが依存関係を自動インストールします。</text>

  <rect x="680" y="555" width="405" height="88" rx="18" class="callout"/>
  <text x="708" y="590" class="text" fill="#9a3412">まず押す場所は右上の緑色「Code」</text>
  <text x="708" y="620" class="small" fill="#9a3412">次に Codespaces → Create codespace</text>
  <path d="M910 553 C930 500 940 465 950 435" class="line"/>
</svg>
