<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Create a Telegram bot with BotFather</title>
  <desc id="desc">A visual step-by-step guide for creating a bot in Telegram using BotFather.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.phone{fill:#0f172a}.screen{fill:#eff6ff}.bubble{fill:#fff;stroke:#bfdbfe;stroke-width:2}.user{fill:#dbeafe;stroke:#60a5fa;stroke-width:2}.secret{fill:#fee2e2;stroke:#ef4444;stroke-width:2}.label{font:800 28px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.text{font:500 20px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.small{font:500 16px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.mono{font:700 17px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.line{stroke:#2563eb;stroke-width:4;fill:none;marker-end:url(#arrow)}.num{font:800 22px system-ui;fill:white}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/></marker>
  </defs>
  <rect class="bg" width="1200" height="820"/>
  <text x="60" y="62" class="label" fill="#0f172a">Step 2: Telegram Botを作る</text>
  <text x="60" y="96" class="text" fill="#475569">BotFatherに話しかけてTokenを取得します。TokenはGitHubに書かず、Secretに保存します。</text>

  <rect x="85" y="135" width="380" height="620" rx="46" class="phone"/>
  <rect x="112" y="175" width="326" height="530" rx="28" class="screen"/>
  <text x="145" y="220" class="text" fill="#0f172a">@BotFather</text>
  <line x1="112" y1="238" x2="438" y2="238" stroke="#bfdbfe"/>

  <rect x="140" y="270" width="230" height="48" rx="20" class="user"/>
  <text x="162" y="301" class="mono" fill="#1d4ed8">/newbot</text>
  <rect x="140" y="338" width="265" height="65" rx="20" class="bubble"/>
  <text x="162" y="365" class="small" fill="#334155">OK. Choose a name</text>
  <text x="162" y="390" class="small" fill="#334155">for your bot.</text>
  <rect x="140" y="423" width="260" height="48" rx="20" class="user"/>
  <text x="162" y="454" class="small" fill="#1d4ed8">UNIV AI Company</text>
  <rect x="140" y="491" width="260" height="48" rx="20" class="user"/>
  <text x="162" y="522" class="small" fill="#1d4ed8">univ_ai_company_bot</text>
  <rect x="140" y="559" width="265" height="86" rx="20" class="secret"/>
  <text x="162" y="587" class="small" fill="#991b1b">Tokenが表示されます</text>
  <text x="162" y="616" class="mono" fill="#991b1b">123:ABC...SECRET</text>

  <g>
    <circle cx="560" cy="195" r="24" fill="#2563eb"/><text x="553" y="204" class="num">1</text>
    <text x="600" y="202" class="text" fill="#0f172a">Telegramで <tspan font-weight="800">@BotFather</tspan> を検索</text>
    <circle cx="560" cy="285" r="24" fill="#2563eb"/><text x="553" y="294" class="num">2</text>
    <text x="600" y="292" class="text" fill="#0f172a"><tspan font-family="monospace" font-weight="800">/newbot</tspan> を送信</text>
    <circle cx="560" cy="375" r="24" fill="#2563eb"/><text x="553" y="384" class="num">3</text>
    <text x="600" y="382" class="text" fill="#0f172a">Bot名とusernameを決める</text>
    <circle cx="560" cy="465" r="24" fill="#ef4444"/><text x="553" y="474" class="num">4</text>
    <text x="600" y="472" class="text" fill="#0f172a">Tokenをコピーして <tspan font-weight="800">TELEGRAM_BOT_TOKEN</tspan> に保存</text>
  </g>

  <rect x="560" y="555" width="555" height="126" rx="20" fill="#fff7ed" stroke="#fb923c" stroke-width="3"/>
  <text x="595" y="595" class="text" fill="#9a3412">重要: TokenはREADME・Issue・チャットログに貼らない</text>
  <text x="595" y="630" class="small" fill="#9a3412">GitHub Codespaces Secrets / VPS環境変数 / Cloud host Secretに保存します。</text>
  <text x="595" y="658" class="small" fill="#9a3412">`.env.example` には名前だけを書き、実値は入れません。</text>
  <path d="M438 600 C500 600 520 600 560 600" class="line"/>
</svg>
