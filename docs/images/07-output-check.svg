<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Check generated outputs</title>
  <desc id="desc">A visual guide showing output files generated by the command hub: Obsidian markdown, SQLite, CSV, Excel, TXT, and GitHub Actions artifact.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.card{fill:#fff;stroke:#cbd5e1;stroke-width:2}.folder{fill:#fef3c7;stroke:#f59e0b;stroke-width:2}.file{fill:#eff6ff;stroke:#60a5fa;stroke-width:2}.artifact{fill:#f0fdf4;stroke:#22c55e;stroke-width:3}.label{font:800 28px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.text{font:500 20px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.small{font:500 16px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.mono{font:700 17px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.line{stroke:#334155;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="60" y="62" class="label" fill="#0f172a">Step 6: 出力を確認する</text>
  <text x="60" y="96" class="text" fill="#475569">/goal を送ると、Markdown・SQLite・CSV・Excel・TXTが生成されます。</text>

  <rect x="70" y="150" width="330" height="475" rx="22" class="card"/>
  <text x="105" y="195" class="label" fill="#0f172a">ローカル出力</text>
  <rect x="105" y="235" width="230" height="48" rx="10" class="folder"/>
  <text x="125" y="266" class="mono" fill="#92400e">outputs/</text>
  <rect x="130" y="305" width="220" height="42" rx="9" class="folder"/>
  <text x="150" y="332" class="mono" fill="#92400e">ObsidianVault/</text>
  <rect x="130" y="365" width="220" height="42" rx="9" class="folder"/>
  <text x="150" y="392" class="mono" fill="#92400e">exports/</text>
  <rect x="155" y="425" width="205" height="38" rx="8" class="file"/>
  <text x="175" y="450" class="mono" fill="#1d4ed8">tasks.csv</text>
  <rect x="155" y="475" width="205" height="38" rx="8" class="file"/>
  <text x="175" y="500" class="mono" fill="#1d4ed8">tasks.xlsx</text>
  <rect x="155" y="525" width="205" height="38" rx="8" class="file"/>
  <text x="175" y="550" class="mono" fill="#1d4ed8">github_issue.md</text>

  <rect x="465" y="150" width="330" height="475" rx="22" class="card"/>
  <text x="500" y="195" class="label" fill="#0f172a">GitHub Actions</text>
  <rect x="500" y="250" width="260" height="90" rx="16" class="artifact"/>
  <text x="525" y="288" class="text" fill="#166534">Artifact</text>
  <text x="525" y="318" class="mono" fill="#166534">ai-company-hub-outputs</text>
  <text x="500" y="385" class="small" fill="#475569">Actions runの下部からDownloadできます。</text>
  <text x="500" y="420" class="small" fill="#475569">CI成功時に自動生成されます。</text>

  <rect x="860" y="150" width="270" height="475" rx="22" class="card"/>
  <text x="895" y="195" class="label" fill="#0f172a">確認ポイント</text>
  <text x="895" y="255" class="small" fill="#475569">1. Telegram返信がある</text>
  <text x="895" y="305" class="small" fill="#475569">2. Issue Markdownがある</text>
  <text x="895" y="355" class="small" fill="#475569">3. Excelが開ける</text>
  <text x="895" y="405" class="small" fill="#475569">4. Actionsがsuccess</text>
  <text x="895" y="455" class="small" fill="#475569">5. Secretsがcommitされてない</text>

  <path d="M400 385 C430 385 435 385 465 385" class="line"/>
  <path d="M795 385 C825 385 830 385 860 385" class="line"/>
</svg>
